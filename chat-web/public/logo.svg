      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8CAD8"/>
    </linearGradient>
  </defs>

  <!-- 纯黑圆角方底 -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#0a0a0c"/>

  <!-- 暗影气泡 -->
  <path d="
    M 155 195
    C 155 165, 180 140, 210 140
    L 340 140
    C 370 140, 390 160, 390 190
    L 390 290
    C 390 320, 370 340, 340 340
    L 270 340
    L 215 390
    L 215 340
    L 210 340
