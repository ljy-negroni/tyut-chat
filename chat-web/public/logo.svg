<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F5BD5"/>
      <stop offset="100%" stop-color="#2830D3"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EAFA"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Shadow bubble (smaller, top-right, translucent) -->
  <path d="
    M 155 195
    C 155 165, 180 140, 210 140
    L 340 140
    C 370 140, 390 160, 390 190
    L 390 290
    C 390 320, 370 340, 340 340
    L 270 340
    L 215 390
    L 215 340
    L 210 340
    C 180 340, 155 320, 155 290
    Z
  " fill="rgba(255,255,255,0.18)"/>

  <!-- Main bubble (larger, bottom-left, white) -->
  <path d="
    M 125 175
    C 125 148, 148 125, 175 125
    L 355 125
    C 382 125, 400 143, 400 170
    L 400 285
    C 400 312, 382 330, 355 330
    L 255 330
    L 195 390
    L 195 330
    L 175 330
    C 148 330, 125 312, 125 285
    Z
  " fill="url(#bubbleGrad)"/>

  <!-- Typing dots -->
  <circle cx="195" cy="245" r="18" fill="#2830D3"/>
  <circle cx="255" cy="245" r="18" fill="#4F5BD5" opacity="0.65"/>
  <circle cx="315" cy="245" r="18" fill="#7B83E8" opacity="0.35"/>
</svg>
