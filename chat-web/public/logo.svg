  " fill="url(#bubbleGrad)"/>

  <!-- 输入点 -->
  <circle cx="195" cy="245" r="18" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="255" cy="245" r="18" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="315" cy="245" r="18" fill="#FFFFFF" opacity="0.25"/>
</svg>
